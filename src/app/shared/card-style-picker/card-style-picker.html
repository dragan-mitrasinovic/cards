<div
  class="picker-backdrop"
  (click)="onBackdropClick($event)"
  (keydown)="onKeydown($event)"
  tabindex="-1"
>
  <div class="picker-modal">
    <div class="picker-header">
      <h3 class="picker-title">Card Style</h3>
      <button class="picker-close" (click)="closed.emit()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="picker-grid">
      @for (s of styles; track s.id) {
        <button
          class="picker-option"
          [class.active]="cardStyleService.style() === s.id"
          (click)="select(s.id)"
        >
          <div class="preview-cards">
            <div class="preview-card preview-back card-theme-{{ s.id }}">
              <span class="preview-back-icon">🂠</span>
            </div>
            <div class="preview-card preview-face card-theme-{{ s.id }}">
              <span class="preview-value">7</span>
              <span class="preview-suit">♥</span>
            </div>
          </div>
          <span class="picker-label">{{ s.label }}</span>
          @if (cardStyleService.style() === s.id) {
            <span class="picker-check">✓</span>
          }
        </button>
      }
    </div>
  </div>
</div>

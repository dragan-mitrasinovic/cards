<div class="reveal-phase">
  <!-- Player bar -->
  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between px-3 sm:px-4 py-2 bg-gray-50 rounded-lg mb-4 gap-1 sm:gap-0">
    <div class="flex items-center gap-2 sm:gap-4">
      <span class="font-semibold text-sm sm:text-base">{{ playerName() }}</span>
      <span class="text-gray-400">&amp;</span>
      <span class="font-semibold text-sm sm:text-base">{{ partnerName() }}</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span class="text-amber-600 font-medium">Reveal Phase</span>
      @if (totalRevealCards() > 0) {
        <span class="text-gray-500">{{ revealedCount() }} / {{ totalRevealCards() }}</span>
      }
    </div>
  </div>

  <!-- Status message -->
  <div class="flex flex-col items-center gap-2 mb-4 p-4 bg-amber-50 rounded-lg border border-amber-200">
    @if (revealedCount() < totalRevealCards()) {
      <p class="text-amber-700 font-medium">Revealing cards…</p>
      <p class="text-sm text-gray-500">Cards are revealed from left to right</p>
    } @else {
      <p class="text-amber-700 font-medium">All cards revealed!</p>
    }
  </div>

  <app-board
    [board]="board()"
    [playerNumber]="playerNumber()"
    [selectedCardIndex]="-1"
    [revealMode]="true"
    [swapHistory]="swapHistory()"
  />
</div>

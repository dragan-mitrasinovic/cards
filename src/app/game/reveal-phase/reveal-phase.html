<div class="reveal-phase">
  <!-- Turn indicator (consistent with placement/swap phase) -->
  <div class="text-center text-sm font-medium py-1.5 px-3 rounded-lg mb-2 mx-auto w-fit text-amber-700 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/30">
    @if (revealedCount() < totalRevealCards()) {
      <span>Revealing cards… {{ revealedCount() }} / {{ totalRevealCards() }}</span>
    } @else {
      <span>All cards revealed!</span>
    }
  </div>

  <app-board
    [board]="board()"
    [playerNumber]="playerNumber()"
    [selectedCardIndex]="-1"
    [revealMode]="true"
    [swapHistory]="swapHistory()"
  />
</div>

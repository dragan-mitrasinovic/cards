<div class="partner-hand-area">
  <p class="partner-name">{{ partnerName() }}</p>
  <div class="partner-cards">
    @for (i of cardSlots(); track i) {
      <app-card [faceUp]="false" [disabled]="true" />
    }
    @if (remainingCards() === 0) {
      <span class="no-cards">No cards in hand</span>
    }
  </div>
</div>

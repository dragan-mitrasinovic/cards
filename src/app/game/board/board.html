<div class="board-container">
  <div class="board">
    @for (slot of board(); track $index) {
      <div
        class="slot"
        [class.slot-empty]="!slot.occupied"
        [class.slot-placeable]="!slot.occupied && selectedCardIndex() >= 0 && isMyTurn()"
        [class.slot-peekable]="slot.occupied && slot.byPlayer === playerNumber() && !swapMode()"
        [class.slot-swappable]="slot.occupied && swapMode()"
        [class.slot-swap-selected]="isSwapSelected($index)"
        [class.slot-swapped-mine]="isSlotSwappedByMe($index)"
        [class.slot-swapped-partner]="isSlotSwappedByPartner($index)"
        [class.slot-last-placed]="isLastPlaced($index)"
        [class.slot-drop-target]="!slot.occupied && dragEnabled() && isMyTurn()"
        cdkDropList
        [cdkDropListData]="$index"
        [cdkDropListDisabled]="!dragEnabled() || slot.occupied || !isMyTurn() || swapMode()"
        [cdkDropListEnterPredicate]="canDrop($index)"
        (cdkDropListDropped)="onDrop($event, $index)"
        (click)="onSlotClick($index)"
      >
        @if (slot.occupied) {
          <app-card
            class="pointer-events-none"
            [card]="slot.card"
            [faceUp]="!!slot.card"
            [ownCard]="slot.byPlayer === playerNumber()"
            [revealed]="revealMode() && !!slot.card"
          />
        } @else {
          <span class="slot-number">{{ $index + 1 }}</span>
        }
        @if (getSlotSwapInfo($index)) {
          <span class="swap-badge" [class.swap-badge-mine]="isSlotSwappedByMe($index)">↔</span>
        }
      </div>
    }
  </div>
</div>
